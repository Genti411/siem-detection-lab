title: LSASS Memory Dump (Credential Dumping)
id: rule-lsass-dump-001
status: experimental
description: Detects comsvcs.dll MiniDump or other access targeting lsass for credential theft.
logsource:
  category: process_creation
detection:
  selection:
    event_type: process_start
    command_line|contains:
      - 'lsass'
      - 'MiniDump'
      - 'comsvcs.dll'
  condition: selection
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
falsepositives:
  - Rare legitimate diagnostics by administrators.
