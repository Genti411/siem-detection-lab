title: User Added to Local Administrators Group
id: rule-privesc-001
status: experimental
description: Detects use of net.exe to add an account to the local administrators group.
logsource:
  category: process_creation
detection:
  selection:
    event_type: process_start
    process: net.exe
    command_line|contains: 'localgroup administrators'
  filter:
    command_line|contains: '/delete'
  condition: selection and not filter
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1098
falsepositives:
  - Legitimate administrator onboarding via scripts.
