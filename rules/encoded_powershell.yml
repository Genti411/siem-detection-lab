title: Encoded PowerShell Command
id: rule-powershell-enc-001
status: experimental
description: PowerShell launched with an encoded command, a common obfuscation/exec technique.
logsource:
  category: process_creation
detection:
  selection:
    event_type: process_start
    process: powershell.exe
    command_line|contains:
      - '-EncodedCommand'
      - '-enc '
      - ' -e '
  condition: selection
level: high
tags:
  - attack.execution
  - attack.t1059.001
falsepositives:
  - Some legitimate management tooling uses encoded commands.
